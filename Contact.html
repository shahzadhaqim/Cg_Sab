<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WANGIAN MARHAEN - Contact</title>

<style>
:root {
    --gold: #D4AF37;
    --gold-dark: #B8941F;
    --black: #0f0f0f;
    --white: #ffffff;
    --gray-light: #cccccc;
}

/* Global */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Montserrat',sans-serif; background-color:var(--black); color:var(--white); line-height:1.6; scroll-behavior:smooth; }
a { text-decoration:none; color:inherit; }
ul { list-style:none; }

/* Navbar */
.navbar { position:fixed; top:0; left:0; right:0; padding:1rem 5%; display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.85); z-index:1000; }
.logo { font-family:'Cormorant Garamond', serif; font-size:1.5rem; font-weight:bold; color:var(--gold); }
.nav-links { display:flex; gap:2rem; }
.nav-links a:hover { color:var(--gold-dark); }

/* Hero */
.hero { min-height:40vh; display:flex; justify-content:center; align-items:center; text-align:center; padding:100px 5% 50px; background: linear-gradient(135deg,#111 0%,#222 100%);}
.hero h1 { font-family:'Cormorant Garamond', serif; font-size:3rem; margin-bottom:1rem; color:var(--gold);}
.hero p { font-size:1.2rem; margin-bottom:1.5rem; color:var(--gray-light);}

/* Contact Section */
.contact-section { padding:80px 5%; text-align:center; }
.contact-section h2 { font-size:2.5rem; color:var(--gold); margin-bottom:2rem; }
.contact-form { max-width:500px; margin:0 auto; display:flex; flex-direction:column; gap:1rem; }
.contact-form input, .contact-form textarea { padding:0.8rem; border:none; border-radius:5px; background:#1a1a1a; color:var(--white); resize:none; }
.contact-form button { padding:0.8rem 1.5rem; background:var(--gold); color:var(--black); font-weight:bold; cursor:pointer; transition: all 0.2s ease; border:none; }
.contact-form button:hover { background:transparent; color:var(--gold-dark); border:1px solid var(--gold-dark); transform:scale(0.98); }

/* Social Media */
.social-links { margin-top:2rem; display:flex; justify-content:center; gap:1.5rem; }
.social-links a { font-size:2rem; color:var(--gold); transition: all 0.3s ease; }
.social-links a:hover { color:var(--gold-dark); transform:scale(1.2); }

/* Footer */
.footer { background:#111; color:var(--gray-light); padding:40px 5%; text-align:center; }

/* Responsive */
@media(max-width:768px){
    .nav-links { flex-direction:column; gap:1rem; margin-top:1rem; }
}
</style>

<!-- Font Awesome CDN for icons -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="index.html" class="logo">WANGIAN MARHAEN</a>
    <ul class="nav-links">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="collections.html">Collections</a></li>
        <li><a href="story.html">Our Story</a></li>
        <li><a href="features.html">Features</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- Hero -->
<section class="hero">
    <div>
        <h1>Contact Us</h1>
        <p>We'd love to hear from you! Get in touch via form or social media.</p>
    </div>
</section>

<!-- Contact Form -->
<section class="contact-section" id="contact">
    <h2>Get in Touch</h2>
    <form class="contact-form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>

    <!-- Social Media Logos -->
    <div class="social-links">
        <a href="https://instagram.com/" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram" width="50">
        </a>
        <a href="https://facebook.com/" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="Facebook" width="50">
        </a>
        <a href="https://wa.me/60123456789" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp" width="50">
        </a>
    </div>
</section>

<!-- Footer -->
<footer class="footer">
    <p>&copy; 2024 WANGIAN MARHAEN. All rights reserved.</p>
</footer>

</body>
</html>
